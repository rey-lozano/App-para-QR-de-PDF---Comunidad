<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="qrGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5F8DFF" />
      <stop offset="100%" stop-color="#7DA5FF" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background glass effect -->
  <rect width="400" height="400" rx="40" fill="white" fill-opacity="0.03" />
  <rect x="1" y="1" width="398" height="398" rx="39" stroke="white" stroke-opacity="0.1" />

  <!-- QR Pattern Blocks (Simplified for "Fake" look) -->
  <!-- Top Left -->
  <rect x="50" y="50" width="100" height="100" rx="10" stroke="url(#qrGrad)" stroke-width="12"/>
  <rect x="75" y="75" width="50" height="50" rx="5" fill="url(#qrGrad)"/>
  
  <!-- Top Right -->
  <rect x="250" y="50" width="100" height="100" rx="10" stroke="url(#qrGrad)" stroke-width="12"/>
  <rect x="275" y="75" width="50" height="50" rx="5" fill="url(#qrGrad)"/>
  
  <!-- Bottom Left -->
  <rect x="50" y="250" width="100" height="100" rx="10" stroke="url(#qrGrad)" stroke-width="12"/>
  <rect x="75" y="275" width="50" height="50" rx="5" fill="url(#qrGrad)"/>
  
  <!-- Random Data Blocks -->
  <g fill="url(#qrGrad)" opacity="0.8">
    <rect x="180" y="50" width="40" height="40" rx="4"/>
    <rect x="180" y="110" width="40" height="40" rx="4"/>
    <rect x="250" y="180" width="40" height="40" rx="4"/>
    <rect x="180" y="180" width="40" height="40" rx="4"/>
    <rect x="110" y="180" width="40" height="40" rx="4"/>
    <rect x="250" y="250" width="40" height="40" rx="4" opacity="0.5"/>
    <rect x="310" y="250" width="40" height="40" rx="4"/>
    <rect x="250" y="310" width="40" height="40" rx="4"/>
    <rect x="310" y="310" width="40" height="40" rx="4" opacity="0.3"/>
  </g>
  
  <!-- Center Accent -->
  <circle cx="200" cy="200" r="20" fill="white" fill-opacity="0.1" stroke="url(#qrGrad)" stroke-width="2"/>
  <path d="M190 200H210M200 190V210" stroke="url(#qrGrad)" stroke-width="4" stroke-linecap="round"/>

</svg>
